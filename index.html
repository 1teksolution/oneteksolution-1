<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Tek Solution | Semiconductor Sourcing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #020617; color: #f8fafc; line-height: 1.6; }

        /* HEADER */
        header {
            background: #0f172a;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        /* YAHAN LOGO KI SETTING HAI */
        .corner-logo { 
            height: 50px; 
            width: auto;
            display: block;
        }

        nav a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 600; font-size: 14px; }
        nav a:hover { color: #38bdf8; }

        /* HERO BANNER */
        .full-banner {
            width: 100%;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle, #1e293b 0%, #020617 100%);
            padding: 40px 20px;
            border-bottom: 3px solid #0ea5e9;
        }

        .center-logo {
            max-width: 450px;
            width: 85%;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            max-width: 600px;
            background: #fff;
            display: flex;
            padding: 5px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .search-box input { flex: 1; border: none; padding: 15px 25px; outline: none; border-radius: 50px; font-size: 16px; color: #333; }
        .search-box button { background: #0ea5e9; color: white; border: none; padding: 0 30px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .container { max-width: 1200px; margin: auto; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 30px; border-radius: 15px; text-align: center; }
        
        footer { text-align: center; padding: 40px; border-top: 1px solid #1e293b; color: #64748b; }
    </style>
</head>
<body>

    <header>
        <!-- Corner me ab office ki jagah ye logo dikhega -->
        <img src="logo1.png?v=2" alt="One Tek Solution Logo" class="corner-logo">
        <nav>
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <section class="full-banner" id="home">
        <!-- Main Banner area -->
        <img src="logo1.png?v=2" alt="One Tek Solution" class="center-logo">
        
        <div class="search-box">
            <input type="text" placeholder="Search Part Number...">
            <button>Search</button>
        </div>
    </section>

    <div class="container" id="products">
        <div class="grid">
            <div class="card"><h3>Semiconductors</h3><p>Genuine sourcing from global networks.</p></div>
            <div class="card"><h3>RF Components</h3><p>High-quality wireless modules.</p></div>
            <div class="card"><h3>Industrial Parts</h3><p>Critical automation spares.</p></div>
        </div>
    </div>

    <footer>
        <p>© 2026 One Tek Solution | GST: 07AIOPC4519Q1ZR</p>
    </footer>

</body>
</html>
