<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background: #08111f;
    color: #fff;
    line-height: 1.6;
  }

  a {
    color: #7dd3fc;
    text-decoration: none;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #111827;
    border-bottom: 1px solid #334155;
  }

  .nav-wrap {
    max-width: 1200px;
    margin: auto;
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
  }

  .header-logo {
    height: 72px;
    width: auto;
    display: block;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  nav a {
    color: #fff;
    font-weight: bold;
    font-size: 15px;
  }

  nav a:hover {
    color: #38bdf8;
  }

  .hero {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 20px 60px;
    background:
      linear-gradient(rgba(8, 17, 31, 0.72), rgba(8, 17, 31, 0.82)),
      url('logo1.png') center center / cover no-repeat;
    border-bottom: 3px solid #38bdf8;
  }

  .hero-content {
    max-width: 1000px;
    width: 100%;
    margin-top: 120px;
  }

  .hero h1 {
    font-size: 48px;
    color: #38bdf8;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }

  .hero p {
    max-width: 850px;
    margin: 0 auto 28px;
    font-size: 18px;
    color: #dbeafe;
  }

  .hero-buttons {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .btn {
    display: inline-block;
    background: #38bdf8;
    color: #000;
    padding: 14px 28px;
    border-radius: 8px;
    font-weight: bold;
  }

  .btn:hover {
    background: #0ea5e9;
    color: #fff;
  }

  .btn-outline {
    display: inline-block;
    border: 1px solid #38bdf8;
    color: #fff;
    padding: 14px 28px;
    border-radius: 8px;
    font-weight: bold;
    background: rgba(17, 24, 39, 0.45);
  }

  .btn-outline:hover {
    background: #38bdf8;
    color: #000;
  }

  .search-box {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 999px;
    display: flex;
    padding: 6px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    padding: 16px 22px;
    font-size: 16px;
    color: #111827;
  }

  .search-box button {
    border: none;
    background: #1d9bf0;
    color: #fff;
    padding: 0 28px;
    border-radius: 999px;
    font-weight: bold;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .nav-wrap {
      flex-direction: column;
    }

    nav {
      justify-content: center;
    }

    .header-logo {
      height: 60px;
    }

    .hero {
      padding: 100px 20px 50px;
    }

    .hero-content {
      margin-top: 80px;
    }

    .hero h1 {
      font-size: 34px;
    }

    .hero p {
      font-size: 16px;
    }

    .search-box {
      flex-direction: column;
      border-radius: 18px;
    }

    .search-box input {
      width: 100%;
    }

    .search-box button {
      margin-top: 6px;
      padding: 14px;
      border-radius: 14px;
    }
  }
</style>

<header>
  <div class="nav-wrap">
    <img src="logo.png" alt="One Tek Solution Logo" class="header-logo">

    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#products">Products</a>
      <a href="#manufacturers">Manufacturers</a>
      <a href="#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="hero" id="home">
  <div class="hero-content">
    <h1>Electronics & Semiconductor Solutions</h1>
    <p>Microcontrollers, RF Components, Industrial Electronics and Global Semiconductor Sourcing for OEMs, manufacturers and engineering teams.</p>

    <div class="hero-buttons">
      <a class="btn" href="[wa.me](https://wa.me/918505807245)">WhatsApp Us</a>
      <a class="btn-outline" href="#contact">Get Quote</a>
    </div>

    <div class="search-box">
      <input type="text" placeholder="Search Part Number (e.g. STM32, NXP, TI...)">
      <button type="button">Search</button>
    </div>
  </div>
</section>
